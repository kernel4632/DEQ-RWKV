[project]
name = "deq-rwkv"
version = "0.1.0"
description = "深度均衡模型与 RWKV-v7 架构结合的实验性项目"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lightning>=2.6.1",
    "matplotlib>=3.10.8",
    "muon-optimizer",
    "numpy>=2.4.2",
    "torch>=2.10.0",
    "torchdeq>=0.1.0",
    "transformers>=4.30.0",
]

[tool.uv.sources]
muon-optimizer = { git = "https://github.com/KellerJordan/Muon" }
